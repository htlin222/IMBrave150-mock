name: Deploy to Cloudflare Pages

# Auto-deploy the claude-demo deck to Cloudflare Pages on every push to main.
on:
  push:
    branches: [main]
    # Only redeploy when the deck (or this workflow) actually changes.
    paths:
      - "claude-demo/**"
      - ".github/workflows/deploy.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Never run two deploys at once; cancel an in-flight one if a newer push arrives.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy claude-demo
            --project-name=imbrave150-demo
            --branch=main
